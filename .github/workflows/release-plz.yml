name: Release-plz

permissions:
  pull-requests: write
  issues: write # needed for labels
  contents: write

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
    # This environment releases crates on crates.io, requires approval
    environment: release
    # only trigger this job if the push to main is from a merged PR with a "release" label
    if: >
      github.repository_owner == 'tkhq' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    permissions:
      contents: write
      # Required for trusted publishing, see https://release-plz.dev/docs/github/quickstart#2-set-the-cargo_registry_token-secret
      id-token: write
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `fetch-depth: 0` is needed to clone all the git history, which is necessary to
          # release from the latest commit of the release PR.
          fetch-depth: 0
      - name: install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@f708778669256143d984cce4b23592637532e040 # v0.5.127
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-tvc-binaries:
    name: Upload tvc binary (${{ matrix.target }})
    needs: release-plz-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    if: >
      github.repository_owner == 'tkhq' &&
      needs.release-plz-release.outputs.releases_created == 'true' &&
      contains(needs.release-plz-release.outputs.releases, '"package_name":"tvc"')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build-tool: cross
            rustflags: -C target-feature=+crt-static
          - target: aarch64-apple-darwin
            os: macos-14
            build-tool: cargo
            rustflags: ""
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false
          target: ${{ matrix.target }}
      - name: Install cross
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cross
        if: contains(matrix.target, '-musl')
      - name: Extract tvc release tag
        id: tvc-release
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(jq -r '.[] | select(.package_name == "tvc") | .tag' <<< "${RELEASES}")
          if [[ -z "${tag}" || "${tag}" == "null" ]]; then
            echo "No tvc release tag found in release-plz outputs" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Upload tvc binary
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: tvc
          package: tvc
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          locked: true
          tar: all
          ref: refs/tags/${{ steps.tvc-release.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'tkhq' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `fetch-depth: 0` is needed to clone all the git history, which is necessary to
          # determine the next version and build the changelog.
          fetch-depth: 0
      - name: install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Run release-plz
        uses: release-plz/action@f708778669256143d984cce4b23592637532e040 # v0.5.127
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}